version: '3.8'

services:
  # Plantilla para bots dinámicos. 
  # Se puede invocar como: CLIENT_SLUG=mi-bot docker-compose up -d
  openclaw_bot:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw_${CLIENT_SLUG:-default}
    restart: unless-stopped
    environment:
      - CLIENT_SLUG=${CLIENT_SLUG}
      - CLIENT_ID=${CLIENT_ID}
    volumes:
      - ./clients/${CLIENT_SLUG:-default}:/app/workspace
